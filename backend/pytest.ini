[pytest]
# pytest 設定 —— 同時服務「無狀態單元測試」與「需真實 DB 的整合測試」。
#
# 預設測試探索 (test discovery) 維持不變：
#   - testpaths = tests
#   - 檔名 test_*.py / 類別 Test* / 函式 test_*
#
# asyncio_mode = auto：pytest-asyncio 自動將 async def 測試視為協程執行，
# 無需在每個 async 測試上標註 @pytest.mark.asyncio。
# (本整合套件透過 TestClient 同步驅動，async 僅用於 worker/DB 查詢的
#  asyncio.run 包裝，故 auto 模式不影響既有同步測試。)
testpaths = tests

asyncio_mode = auto

# 註冊自訂標記 (custom marker)，避免 PytestUnknownMarkWarning。
# integration：需要真實 PostgreSQL (DATABASE_URL=postgresql+asyncpg://...)
#   且環境變數 RUN_DB_TESTS=1 才會執行；否則由 conftest.py 自動跳過。
markers =
    integration: 需要真實 PostgreSQL 的 DB 整合測試 (RUN_DB_TESTS=1 時才執行)
