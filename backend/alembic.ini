# =============================================================================
# Alembic configuration - CPM scheduling SaaS
# -----------------------------------------------------------------------------
# NOTE: keep this file ASCII-only. Alembic reads it with the OS locale encoding
# (e.g. cp950 on zh-TW Windows), so non-ASCII comments would crash the CLI.
#
# The connection URL is NOT configured here: migrations/env.py resolves it as
#   MIGRATE_DATABASE_URL (optional, privileged DSN for ops-run migrations)
#   > app.config.settings.database_url (itself reads env DATABASE_URL)
#   > env DATABASE_URL
#
# Usage (from the backend/ directory):
#   alembic upgrade head      # apply migrations (builds full schema on empty DB)
#   alembic stamp head        # mark an existing DB as baseline (no DDL)
#   python -m app.migrate     # auto stamp-or-upgrade (container entry step)
# =============================================================================

[alembic]
# Migration scripts location (%(here)s = directory of this ini file)
script_location = %(here)s/migrations

# Allow env.py to import app.* when the alembic CLI is run from backend/
# (python -m app.migrate uses the command API in-process and ignores this)
prepend_sys_path = .

# Left empty on purpose - resolved dynamically by migrations/env.py (see header)
sqlalchemy.url =

# -----------------------------------------------------------------------------
# Logging (standard alembic template)
# -----------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
