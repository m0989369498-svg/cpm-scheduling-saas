# =============================================================================
# Frontend nginx.conf — SPA 靜態服務 (此檔載入為 /etc/nginx/conf.d/default.conf)
# 僅服務前端靜態資源; API 路由由 gateway 負責 (此處不做 /api proxy)。
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 壓縮靜態資源
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # 靜態資產快取 (Vite 產出帶 hash 檔名, 可長期快取)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — 所有未命中路徑回傳 index.html, 交由前端路由處理
    location / {
        try_files $uri $uri/ /index.html;
    }
}
