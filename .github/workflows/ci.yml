name: CI

# 企業級工程排程 SaaS (CPM) — Continuous Integration
# Runs on ubuntu-latest (Linux) where asyncpg / httptools / reportlab all have wheels.
on:
  push:
  pull_request:
  workflow_dispatch:

# Silence the "Node.js 20 actions are deprecated" warnings by forcing JS actions
# onto the Node 24 runtime. Top-level (applies to all jobs); does not otherwise
# change job behavior.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================================================
  # Backend — unit + DB integration tests against real Postgres 15 + Redis 7.
  # The cpm_app (NOSUPERUSER / NOBYPASSRLS) role is created by db/init.sql; the
  # app + tests connect as cpm_app so RLS tenant isolation is actually enforced.
  # ===========================================================================
  backend-tests:
    name: Backend tests (pytest + Postgres RLS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cpm
          POSTGRES_PASSWORD: cpm_password
          POSTGRES_DB: cpm_saas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpm -d cpm_saas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # aiosqlite：tests/test_auth.py 以 sqlite dev 模式執行 (不需 Postgres)。
          # 它不屬正式 Postgres 依賴 (requirements.txt) 故額外安裝，否則 test_auth
          # 於匯入時即 ModuleNotFoundError，且其 fixture 會在切到 sqlite 後失敗。
          pip install aiosqlite

      - name: Install PostgreSQL client (psql)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Load schema, RLS and seed (creates cpm_app role)
        env:
          PGPASSWORD: cpm_password
        run: |
          psql -h localhost -U cpm -d cpm_saas -v ON_ERROR_STOP=1 -f db/init.sql

      - name: Alembic baseline (python -m app.migrate)
        working-directory: backend
        env:
          # 遷移以「具 DDL 權限」的 DB owner (cpm) 執行：cpm_app 為刻意無 DDL
          # 權限的應用角色 (PG15 起 public schema 預設不開放 CREATE)，無法建立
          # alembic_version 表。stamp 由 cpm 落地後，cpm_app 透過 init.sql 的
          # ALTER DEFAULT PRIVILEGES 取得該表的 SELECT/UPDATE 權限。
          DATABASE_URL: postgresql+asyncpg://cpm:cpm_password@localhost:5432/cpm_saas
        run: |
          # init.sql 已建好全部資料表 -> migrate 偵測到既有 schema 且無
          # alembic_version，執行 alembic stamp head (不跑任何 DDL)
          python -m app.migrate
          # 再以應用角色 cpm_app 跑一次 -> 已在 head，upgrade 為冪等 no-op，
          # 同時驗證容器啟動路徑 (command 內的 python -m app.migrate) 可用
          DATABASE_URL=postgresql+asyncpg://cpm_app:cpm_app_password@localhost:5432/cpm_saas \
            python -m app.migrate

      - name: Run unit + integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://cpm_app:cpm_app_password@localhost:5432/cpm_saas
          REDIS_URL: redis://localhost:6379/0
          RUN_DB_TESTS: "1"
        run: |
          python -m pytest -v

  # ===========================================================================
  # Frontend — Vite production build.
  # ===========================================================================
  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        working-directory: frontend
        run: npm run build

  # ===========================================================================
  # Compose E2E — real container stack verification through the nginx gateway:
  #   nginx (8080) -> backend (FastAPI) -> postgres (RLS via cpm_app) + worker.
  # Proves end-to-end tenant isolation and that the worker container stays up.
  # ===========================================================================
  compose-e2e:
    name: Compose E2E (real stack via gateway)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: |
          cp .env.example .env
          # FIX-1：demo 種子帳號現僅在 sqlite / DEV_BOOTSTRAP 模式建立。e2e 走真實
          # Postgres，故顯式開啟 bootstrap 讓 compose (由 .env 內插) 種入 admin@tw 等
          # demo 帳號，使後續 admin@tw/demo1234 登入流程維持綠燈。
          echo "DEV_BOOTSTRAP=true" >> .env

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for backend (via gateway)
        # compose sets AUTH_REQUIRED=true, so /api/v1/projects now 401s without a
        # Bearer token. Use the unauthenticated /health probe as the readiness gate.
        run: |
          set -euo pipefail
          echo "::group::Waiting for gateway -> backend to become ready"
          ready=""
          for i in $(seq 1 60); do
            code=$(curl -o /dev/null -s -w "%{http_code}" \
              http://localhost:8080/health || true)
            echo "attempt ${i}: HTTP ${code}"
            if [ "${code}" = "200" ]; then
              ready="yes"
              break
            fi
            sleep 5
          done
          echo "::endgroup::"
          if [ -z "${ready}" ]; then
            echo "ERROR: backend did not become ready via gateway in time"
            exit 1
          fi
          echo "OK: backend is reachable through the gateway"

      - name: Smoke test through the real stack (JWT auth + RLS isolation)
        run: |
          set -euo pipefail

          echo "::group::(0) Login as admin@tw -> get Bearer token (AUTH_REQUIRED=true)"
          login_code=$(curl -o /tmp/login_tw.json -s -w "%{http_code}" \
            -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username": "admin@tw", "password": "demo1234"}')
          echo "login HTTP ${login_code}"
          cat /tmp/login_tw.json || true
          echo ""
          if [ "${login_code}" != "200" ]; then
            echo "ERROR: login expected 200, got ${login_code}"
            exit 1
          fi
          TW_TOKEN=$(python3 -c "import json;print(json.load(open('/tmp/login_tw.json'))['access_token'])")
          TW_TENANT=$(python3 -c "import json;print(json.load(open('/tmp/login_tw.json'))['tenant_id'])")
          if [ -z "${TW_TOKEN}" ]; then
            echo "ERROR: no access_token in login response"
            exit 1
          fi
          if [ "${TW_TENANT}" != "TENT-9981" ]; then
            echo "ERROR: expected tenant_id TENT-9981, got ${TW_TENANT}"
            exit 1
          fi
          echo "OK: obtained Bearer token for ${TW_TENANT}"
          echo "::endgroup::"

          echo "::group::(0b) No Authorization header -> expect 401 (auth enforced)"
          noauth_code=$(curl -o /dev/null -s -w "%{http_code}" \
            http://localhost:8080/api/v1/projects)
          echo "no-auth GET HTTP ${noauth_code}"
          if [ "${noauth_code}" != "401" ]; then
            echo "ERROR: unauthenticated request expected 401, got ${noauth_code}"
            echo "AUTH_REQUIRED is NOT enforced end-to-end!"
            exit 1
          fi
          echo "OK: unauthenticated request rejected (401)"
          echo "::endgroup::"

          echo "::group::(a) Create project PRJ-E2E as admin@tw -> expect 201"
          create_code=$(curl -o /tmp/create.json -s -w "%{http_code}" \
            -X POST http://localhost:8080/api/v1/projects \
            -H "Authorization: Bearer ${TW_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
                  "project_id": "PRJ-E2E",
                  "project_name": "E2E Smoke Project",
                  "region": "TW",
                  "schedule_data": [
                    {"task_id": "E-01", "task_name": "Design", "duration": 4, "predecessors": [], "status": "PENDING"},
                    {"task_id": "E-02", "task_name": "Build", "duration": 6, "predecessors": ["E-01"], "status": "PENDING"}
                  ]
                }')
          echo "create response body:"
          cat /tmp/create.json || true
          echo ""
          echo "create HTTP ${create_code}"
          # POST /projects 依 REST 慣例回 201 Created (見 routers/projects.py 的
          # status_code=HTTP_201_CREATED)；200/201 皆視為建立成功。
          if [ "${create_code}" != "200" ] && [ "${create_code}" != "201" ]; then
            echo "ERROR: project creation expected 200/201, got ${create_code}"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::(b) GET PRJ-E2E as owner admin@tw -> expect 200"
          get_owner_code=$(curl -o /tmp/get_owner.json -s -w "%{http_code}" \
            -H "Authorization: Bearer ${TW_TOKEN}" \
            http://localhost:8080/api/v1/projects/PRJ-E2E)
          echo "owner GET HTTP ${get_owner_code}"
          if [ "${get_owner_code}" != "200" ]; then
            echo "ERROR: owner read expected 200, got ${get_owner_code}"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::(c) GET PRJ-E2E as admin@cn (TENT-CN-002) -> expect 404 (RLS isolation)"
          cn_login_code=$(curl -o /tmp/login_cn.json -s -w "%{http_code}" \
            -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username": "admin@cn", "password": "demo1234"}')
          echo "cn login HTTP ${cn_login_code}"
          if [ "${cn_login_code}" != "200" ]; then
            echo "ERROR: admin@cn login expected 200, got ${cn_login_code}"
            cat /tmp/login_cn.json || true
            exit 1
          fi
          CN_TOKEN=$(python3 -c "import json;print(json.load(open('/tmp/login_cn.json'))['access_token'])")
          get_outsider_code=$(curl -o /tmp/get_outsider.json -s -w "%{http_code}" \
            -H "Authorization: Bearer ${CN_TOKEN}" \
            http://localhost:8080/api/v1/projects/PRJ-E2E)
          echo "outsider (admin@cn) GET HTTP ${get_outsider_code}"
          if [ "${get_outsider_code}" != "404" ]; then
            echo "ERROR: cross-tenant read expected 404 (RLS), got ${get_outsider_code}"
            echo "RLS isolation is NOT enforced end-to-end!"
            exit 1
          fi
          echo "OK: RLS isolation enforced end-to-end (admin@cn got 404 for a TW project)"
          echo "::endgroup::"

          echo "::group::(d) Assert worker container is running"
          docker compose ps
          worker_state=$(docker compose ps --status running --services | grep -x worker || true)
          if [ "${worker_state}" != "worker" ]; then
            echo "ERROR: worker container is not running"
            docker compose ps worker
            exit 1
          fi
          echo "OK: worker container is running"
          echo "::endgroup::"

          echo "ALL E2E ASSERTIONS PASSED"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down the stack
        if: always()
        run: docker compose down -v
