# =============================================================================
# Gateway nginx.conf — 反向代理 (完整 http{} 設定, 載入為 /etc/nginx/nginx.conf)
# 路由規則:
#   /api/  -> backend (FastAPI, :8000)
#   /      -> frontend (nginx SPA, :80)
# 雙區域 (cross-strait) 路由說明見下方 server_name 註解。
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'tenant="$http_x_tenant_id" region="$http_x_region"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # PDF 報表等大回應緩衝
    proxy_buffering on;
    client_max_body_size 16m;

    # -------------------------------------------------------------------------
    # 登入速率限制 (login rate-limit) — 以來源 IP 為 key，緩解暴力破解 / 撞庫。
    # rate=10r/m：平均每分鐘 10 次；location 內以 burst=5 nodelay 允許短暫突發。
    # 後端 (app/core/ratelimit.py) 另有「帳號+IP」鎖定，gateway 此層為第一道防線。
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;

    # -------------------------------------------------------------------------
    # Upstreams — 以 docker service name 解析 (同一網路)
    # -------------------------------------------------------------------------
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    # -------------------------------------------------------------------------
    # 預設 server — 單一入口同時服務兩岸租戶 (租戶由 X-Tenant-Id header 決定)
    # -------------------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        # ---- 安全標頭 (security headers) — 套用於所有回應 ----------------------
        # always: 連 4xx/5xx 錯誤回應也帶上。
        # 注意 nginx 繼承規則: location 內若自行宣告 add_header 會覆蓋 server 層，
        # 目前所有 location 皆未宣告 add_header，故 server 層即全站生效。
        add_header X-Content-Type-Options nosniff always;        # 禁止 MIME sniffing
        add_header X-Frame-Options DENY always;                  # 禁止被 iframe 嵌入 (clickjacking)
        add_header Referrer-Policy no-referrer always;           # 不外洩 Referer

        # ---- 登入端點: 套用速率限制 (須置於通用 /api/ 之前才會優先匹配) ----------
        # location = (精確匹配) 對 POST /api/v1/auth/login 套用 login_zone 限流；
        # burst=5 nodelay：允許 5 次突發後即依 rate 節流，超量回 503 (nginx 預設)。
        # proxy 設定與下方通用 /api/ 一致 (透傳租戶 / 區域 header)。
        location = /api/v1/auth/login {
            limit_req zone=login_zone burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 透傳多租戶 / 區域 header (RLS 與 i18n 依賴)
            proxy_set_header X-Tenant-Id       $http_x_tenant_id;
            proxy_set_header X-Region          $http_x_region;
            proxy_request_buffering off;
        }

        # ---- API: 轉發至 FastAPI backend --------------------------------------
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 透傳多租戶 / 區域 header (RLS 與 i18n 依賴)
            proxy_set_header X-Tenant-Id       $http_x_tenant_id;
            proxy_set_header X-Region          $http_x_region;
            # 報表為 streaming PDF, 關閉 request buffering 較順暢
            proxy_request_buffering off;
        }

        # ---- 健康檢查直通 backend --------------------------------------------
        location = /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        # ---- OpenAPI / Swagger 文件 (經 gateway 提供; backend :8000 不再對外) --
        # compose 已移除 backend 的 ports 映射 (僅 expose 於內網)，
        # Swagger UI 改由 http://localhost:8080/docs 透過 gateway 存取。
        location = /docs {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id       $http_x_tenant_id;
            proxy_set_header X-Region          $http_x_region;
        }

        location = /openapi.json {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id       $http_x_tenant_id;
            proxy_set_header X-Region          $http_x_region;
        }

        # ---- SPA 前端 --------------------------------------------------------
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # =========================================================================
    # 雙區域 (Cross-Strait) 路由示例 — 依網域分流台灣 / 大陸租戶
    # 若採「網域分流」部署, 可改用下列具名 server 區塊 (需 DNS + 憑證):
    #
    #   server {
    #       listen 80;
    #       server_name tw.app.com;        # 台灣站 (region=TW, LINE 通知)
    #       location /api/ {
    #           proxy_pass http://backend;
    #           proxy_set_header X-Region TW;          # 強制標記區域
    #           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #           proxy_set_header Host $host;
    #       }
    #       location / { proxy_pass http://frontend; }
    #   }
    #
    #   server {
    #       listen 80;
    #       server_name cn.app.com;        # 大陸站 (region=CN, 釘釘 DingTalk 通知)
    #       location /api/ {
    #           proxy_pass http://backend;
    #           proxy_set_header X-Region CN;          # 強制標記區域
    #           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #           proxy_set_header Host $host;
    #       }
    #       location / { proxy_pass http://frontend; }
    #   }
    #
    # 兩岸共用同一 backend/frontend 映像; 資料隔離由 PostgreSQL RLS
    # (app.current_tenant GUC) 保證, 區域差異 (通知通道 / i18n) 由 X-Region 驅動。
    # =========================================================================

    # =========================================================================
    # TLS (HTTPS) 終結模板 — 生產環境必備, 預設註解
    # -------------------------------------------------------------------------
    # 生產環境「必須」在 gateway 終結 TLS，或交由外部終結器
    # (雲端 LB / Cloudflare Tunnel `cloudflared` / Caddy 等) 處理：
    #   1) 取得憑證 (Let's Encrypt / 企業 CA)，掛載到容器：
    #      docker-compose gateway 服務加上
    #        volumes:
    #          - ./gateway/certs:/etc/nginx/certs:ro
    #   2) 取消下方 server 區塊註解並調整 server_name / 憑證路徑；
    #   3) 將原 listen 80 server 改為 301 導向 https (或保留給內網健康檢查)。
    # 若由外部終結 (cloudflared / LB)，gateway 維持 80 即可，但「不可」把
    # 80 端口直接暴露到公網。
    #
    # server {
    #     listen 443 ssl;
    #     http2  on;
    #     server_name app.example.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1h;
    #
    #     # 安全標頭 (與 80 server 相同) + HSTS — 「僅」在確認 TLS 全面就緒後
    #     # 才開啟 HSTS，否則瀏覽器會在 max-age 期間拒絕 http 回退。
    #     add_header X-Content-Type-Options nosniff always;
    #     add_header X-Frame-Options DENY always;
    #     add_header Referrer-Policy no-referrer always;
    #     # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # 路由與 80 server 完全相同 (login 限流 / /api/ / /docs / /health / SPA)，
    #     # 部署時直接複製上方 default_server 的所有 location 區塊到此。
    # }
    #
    # # HTTP -> HTTPS 導向 (啟用 443 後將原 default_server 改為此)
    # # server {
    # #     listen 80 default_server;
    # #     server_name _;
    # #     return 301 https://$host$request_uri;
    # # }
    # =========================================================================
}
