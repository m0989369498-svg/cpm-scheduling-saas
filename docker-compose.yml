# =============================================================================
# 企業級工程排程 SaaS (CPM) — Docker Compose 編排
# Service names MUST match config hostnames: postgres / redis / backend / worker
# Single network. Healthchecks + depends_on(service_healthy).
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 15 — 主資料庫 (RLS 多租戶隔離; init.sql 建表 + RLS + 種子資料)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: cpm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cpm
      # 生產務必於 .env 覆寫 POSTGRES_PASSWORD (此為本機開發回退值)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cpm_password}
      POSTGRES_DB: cpm_saas
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 初始化 schema / RLS / 種子資料 (僅在資料卷為空時執行)
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpm -d cpm_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cpm_net

  # --------------------------------------------------------------------------
  # Redis 7 — 快取 / 佇列
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cpm_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - cpm_net

  # --------------------------------------------------------------------------
  # Backend — FastAPI (CPM 引擎 + REST API)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cpm_backend
    restart: unless-stopped
    environment:
      # cpm_app 密碼生產務必於 .env 覆寫 CPM_APP_PASSWORD (並先 ALTER ROLE 同步, 見 .env.example)
      DATABASE_URL: postgresql+asyncpg://cpm_app:${CPM_APP_PASSWORD:-cpm_app_password}@postgres:5432/cpm_saas
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      API_V1_PREFIX: /api/v1
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      DEFAULT_REGION: TW
      # --- JWT 認證 (生產/compose 強制啟用 Bearer Token) ---
      AUTH_REQUIRED: "true"
      # 正式環境請於主機環境或 .env 設定高強度 JWT_SECRET (>=32 bytes 隨機值)；
      # 下方僅為未設定時的本機開發回退值。
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-DO-NOT-USE-IN-PROD-change-me}
      JWT_EXPIRE_MINUTES: "720"
      # --- 種子 / 初始管理員 (FIX-1) ---
      # DEV_BOOTSTRAP=true 時於非 sqlite 亦 create_all + 種 demo 帳號 (e2e / 本機)；
      # 正式環境留 false，改以 INITIAL_ADMIN_* 首次啟動建立管理員。
      DEV_BOOTSTRAP: ${DEV_BOOTSTRAP:-false}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_TENANT: ${INITIAL_ADMIN_TENANT:-TENT-9981}
      LINE_CHANNEL_ACCESS_TOKEN: ""
      DINGTALK_WEBHOOK_URL: ""
      ERP_SCAN_INTERVAL_SECONDS: "300"
      ERP_MAX_RETRIES: "5"
    # 僅 expose 於內部網路 — gateway (:8080) 是唯一對外入口；
    # Swagger / OpenAPI 改經 gateway 存取: http://localhost:8080/docs
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # /health 會檢查 DB (SELECT 1) 與 redis ping; db 失敗回 503 -> unhealthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    command: sh -c "python -m app.migrate && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - cpm_net

  # --------------------------------------------------------------------------
  # Worker — ERP 拋轉背景排程 (APScheduler; 掃描 erp_integration.sync_event_log)
  # 使用自有 engine/session, 不設定 app.current_tenant (跨租戶掃描)
  # --------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cpm_worker
    restart: unless-stopped
    environment:
      # cpm_app 密碼生產務必於 .env 覆寫 CPM_APP_PASSWORD (與 backend 一致)
      DATABASE_URL: postgresql+asyncpg://cpm_app:${CPM_APP_PASSWORD:-cpm_app_password}@postgres:5432/cpm_saas
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      API_V1_PREFIX: /api/v1
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      DEFAULT_REGION: TW
      # --- JWT 認證 (與 backend 共用同一把 secret) ---
      AUTH_REQUIRED: "true"
      # 正式環境請於主機環境或 .env 設定高強度 JWT_SECRET (>=32 bytes 隨機值)；
      # 下方僅為未設定時的本機開發回退值。
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-DO-NOT-USE-IN-PROD-change-me}
      JWT_EXPIRE_MINUTES: "720"
      # --- 種子 / 初始管理員 (FIX-1；與 backend 一致) ---
      DEV_BOOTSTRAP: ${DEV_BOOTSTRAP:-false}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_TENANT: ${INITIAL_ADMIN_TENANT:-TENT-9981}
      LINE_CHANNEL_ACCESS_TOKEN: ""
      DINGTALK_WEBHOOK_URL: ""
      ERP_SCAN_INTERVAL_SECONDS: "300"
      ERP_MAX_RETRIES: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # worker 每個掃描 tick 會 touch /tmp/worker_heartbeat (見 app/erp/worker.py)；
    # 心跳檔存在且 mtime 距今 < ERP_SCAN_INTERVAL_SECONDS*2+120 秒 => healthy。
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys,time; p='/tmp/worker_heartbeat'; max_age=int(os.environ.get('ERP_SCAN_INTERVAL_SECONDS','300'))*2+120; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p) < max_age else 1)"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: sh -c "python -m app.migrate && python -m app.erp.worker"
    networks:
      - cpm_net

  # --------------------------------------------------------------------------
  # Frontend — React + Vite (build) -> nginx 靜態服務 (SPA)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 體驗版：預填 demo 登入帳密 (VITE_DEMO_LOGIN=1)。正式環境於 .env 設 0。
        VITE_DEMO_LOGIN: "${VITE_DEMO_LOGIN:-1}"
    container_name: cpm_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - cpm_net

  # --------------------------------------------------------------------------
  # Gateway — nginx 反向代理 (/api -> backend, / -> frontend; 雙區域路由)
  # --------------------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: cpm_gateway
    restart: unless-stopped
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    networks:
      - cpm_net

# -----------------------------------------------------------------------------
# Named volume — PostgreSQL 持久化資料
# -----------------------------------------------------------------------------
volumes:
  pgdata:

# -----------------------------------------------------------------------------
# 單一網路 — 所有服務以 service name 互通 (hostname == service name)
# -----------------------------------------------------------------------------
networks:
  cpm_net:
    driver: bridge
